<style>

<header class="w-full top-0 px-md flex justify-between items-center h-xxl bg-transparent">
<div class="flex items-center gap-base">
<button class="material-symbols-outlined text-primary dark:text-primary scale-95 active:opacity-80 transition-all">arrow_back</button>
<span class="font-headline-md text-headline-md font-bold text-secondary dark:text-secondary">StudyMind AI</span>
</div>
<button class="font-label-md text-label-md text-on-surface-variant dark:text-on-surface-variant hover:text-primary transition-colors">Skip</button>
</header>
<main class="w-full max-w-container-max px-md flex-1 flex flex-col">
<!-- Progress Indicator -->
<div class="flex justify-center gap-xs mt-md mb-lg">
<div class="w-8 h-1 rounded-full bg-primary opacity-30"></div>
<div class="w-12 h-1 rounded-full bg-primary glow-indigo shadow-primary"></div>
<div class="w-8 h-1 rounded-full bg-outline opacity-20"></div>
<div class="w-8 h-1 rounded-full bg-outline opacity-20"></div>
</div>
<!-- Header -->
<div class="mb-xl">
<h1 class="font-headline-md text-headline-md-mobile md:text-headline-md text-on-surface text-center">What are you studying?</h1>
<p class="text-on-surface-variant text-center mt-xs font-body-md">Select your primary subjects to personalize your AI tutor.</p>
</div>
<!-- Search Bar -->
<div class="relative w-full mb-lg group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">search</span>
<input class="w-full bg-surface-container-low border-b border-outline-variant focus:border-primary focus:ring-0 focus:outline-none py-md pl-xl pr-md glass-panel rounded-t-xl transition-all font-body-md" placeholder="Search subjects..." type="text"/>
</div>
<!-- Subjects Grid -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-md mb-lg" id="subjects-grid">
<!-- Math -->
<button class="subject-chip glass-panel p-lg rounded-xl flex flex-col items-center gap-sm transition-all hover:bg-white/5 active:scale-95" onclick="toggleSubject(this)">
<span class="material-symbols-outlined text-secondary text-[32px]">functions</span>
<span class="font-label-md">Math</span>
<span class="material-symbols-outlined hidden check-icon text-white">check_circle</span>
</button>
<!-- Physics -->
<button class="subject-chip glass-panel p-lg rounded-xl flex flex-col items-center gap-sm transition-all hover:bg-white/5 active:scale-95" onclick="toggleSubject(this)">
<span class="material-symbols-outlined text-secondary text-[32px]">rocket_launch</span>
<span class="font-label-md">Physics</span>
<span class="material-symbols-outlined hidden check-icon text-white">check_circle</span>
</button>
<!-- CS -->
<button class="subject-chip glass-panel p-lg rounded-xl flex flex-col items-center gap-sm transition-all hover:bg-white/5 active:scale-95" onclick="toggleSubject(this)">
<span class="material-symbols-outlined text-secondary text-[32px]">terminal</span>

<span class="material-symbols-outlined hidden check-icon text-white">check_circle</span>
</button>
<!-- History -->

</button>
<!-- Biology -->

<span class="material-symbols-outlined text-secondary scale-125 transition-all duration-300">horizontal_rule</span>
<span class="material-symbols-outlined text-outline opacity-30 transition-all duration-300">horizontal_rule</span>
</div>
</nav>
<script>
        function toggleSubject(el) {
            const isSelected = el.getAttribute('data-selected') === 'true';
            const checkIcon = el.querySelector('.check-icon');
            const mainIcon = el.querySelector('.material-symbols-outlined:not(.check-icon)');
            
            if (!isSelected) {
                // Select state
                el.style.backgroundColor = '#6C63FF';
                el.classList.add('active-glow');
                el.classList.remove('glass-panel');
                el.classList.add('text-white');
                mainIcon.classList.add('hidden');
                checkIcon.classList.remove('hidden');
                el.setAttribute('data-selected', 'true');
            } else {
                // Deselect state
                el.style.backgroundColor = 'transparent';
                el.classList.remove('active-glow');
                el.classList.add('glass-panel');
                el.classList.remove('text-white');
                mainIcon.classList.remove('hidden');
                checkIcon.classList.add('hidden');
                el.setAttribute('data-selected', 'false');
            }
        }
    </script>
