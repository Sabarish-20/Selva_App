<script>
        // Particle Animation
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 60;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                // Randomly pick between Indigo (Primary) and Gold (Secondary)
                this.color = Math.random() > 0.5 ? '#c4c0ff' : '#eec13c';
                this.opacity = Math.random() * 0.5 + 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }

            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Carousel Logic
        const items = document.querySelectorAll('.carousel-item');
        const progressBar = document.getElementById('progress-bar');
        let currentIndex = 0;

        function rotateText() {
            const currentItem = items[currentIndex];
            currentItem.classList.remove('active');
            currentItem.classList.add('exit');

            setTimeout(() => {
                currentItem.classList.remove('exit');
            }, 800);

            currentIndex = (currentIndex + 1) % items.length;
            items[currentIndex].classList.add('active');
            
            // Update progress bar
            const progress = ((currentIndex + 1) / items.length) * 100;
            progressBar.style.width = `${Math.min(progress, 98)}%`;
        }

        setInterval(rotateText, 3000);

        // Simulation for loading progress
        let pWidth = 5;
        const progressTimer = setInterval(() => {
            if (pWidth < 95) {
                pWidth += Math.random() * 1.5;
                progressBar.style.width = pWidth + '%';
            }
        }, 150);

    </script>
