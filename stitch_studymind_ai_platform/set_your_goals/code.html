<script>
        // Interactive Slider Update
        const slider = document.getElementById('hour-slider');
        const display = document.getElementById('hour-value');

        slider.addEventListener('input', function() {
            display.textContent = this.value;
            // Aesthetic vibration or sound could be triggered here
        });

        // Simple Toggle Behavior for Selection Cards
        const cards = document.querySelectorAll('button.glass-panel');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => {
                    c.classList.remove('border-secondary');
                    c.classList.add('border-transparent');
                    const indicator = c.querySelector('.w-3.h-3');
                    if(indicator) indicator.classList.add('opacity-0');
                });
                card.classList.remove('border-transparent');
                card.classList.add('border-secondary');
                const indicator = card.querySelector('.w-3.h-3');
                if(indicator) indicator.classList.remove('opacity-0');
            });
        });
    </script>
