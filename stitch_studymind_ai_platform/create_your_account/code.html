<!-- Micro-interactions Script -->
<script>
        const passwordInput = document.getElementById('password-input');
        const strengthIndicator = document.getElementById('strength-indicator');

        passwordInput.addEventListener('input', (e) => {
            const val = e.target.value;
            let strength = 0;
            
            if (val.length > 5) strength += 25;
            if (val.match(/[A-Z]/)) strength += 25;
            if (val.match(/[0-9]/)) strength += 25;
            if (val.match(/[^A-Za-z0-9]/)) strength += 25;

            strengthIndicator.style.width = strength + '%';
            
            if (strength <= 25) {
                strengthIndicator.style.backgroundColor = '#ffb4ab'; // Error
            } else if (strength <= 50) {
                strengthIndicator.style.backgroundColor = '#ffb785'; // Tertiary
            } else if (strength <= 75) {
                strengthIndicator.style.backgroundColor = '#eec13c'; // Secondary
            } else {
                strengthIndicator.style.backgroundColor = '#c4c0ff'; // Primary
            }
        });
    </script>
