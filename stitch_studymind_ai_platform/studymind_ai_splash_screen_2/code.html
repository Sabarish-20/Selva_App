<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&amp;family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#6C63FF",
                        "secondary": "#F5C842",
                        "background": "#0A0E1A",
                        "cream": "#F0EDE6",
                        "surface": "#161b2e",
                        "on-surface-variant": "#c7c4d8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "lg": "24px",
                        "container-max": "1280px",
                        "sm": "8px",
                        "md": "16px",
                        "xl": "40px",
                        "base": "8px",
                        "gutter": "24px",
                        "xxl": "64px"
                    },
                    "fontFamily": {
                        "headline-md": ["Syne", "sans-serif"],
                        "label-md": ["DM Sans", "sans-serif"],
                        "display-lg-mobile": ["Syne", "sans-serif"],
                        "headline-sm": ["Syne", "sans-serif"],
                        "display-lg": ["Syne", "sans-serif"],
                        "body-lg": ["DM Sans", "sans-serif"],
                        "body-md": ["DM Sans", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-md": ["32px", {"lineHeight": "1.3", "fontWeight": "700"}],
                        "label-md": ["14px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "display-lg-mobile": ["36px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "headline-sm": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(15px, -20px) rotate(5deg); }
            66% { transform: translate(-10px, 15px) rotate(-5deg); }
        }
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(140px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(140px) rotate(-360deg); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; filter: blur(40px); }
            50% { opacity: 0.7; filter: blur(70px); }
        }
        @keyframes breathing-text-glow {
            0%, 100% { text-shadow: 0 0 15px rgba(108, 99, 255, 0.4); }
            50% { text-shadow: 0 0 35px rgba(108, 99, 255, 0.8), 0 0 10px rgba(108, 99, 255, 0.4); }
        }
        @keyframes progress-load {
            0% { width: 0%; opacity: 0.5; }
            30% { width: 40%; }
            70% { width: 90%; }
            100% { width: 100%; opacity: 1; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slow-fade {
            0% { opacity: 0; }
            100% { opacity: 0.7; }
        }
        @keyframes dust-drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, -5%); }
        }

        .animate-breathing-glow { animation: breathing-text-glow 4s ease-in-out infinite; }
        .loading-bar-fill { animation: progress-load 2.5s cubic-bezier(0.65, 0, 0.35, 1) forwards; }
        .animate-slow-fade { animation: slow-fade 1.5s ease-out 0.8s forwards; opacity: 0; }
        
        canvas#constellation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .orbit-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 2;
        }

        .orbiting-icon {
            position: absolute;
            color: rgba(240, 237, 230, 0.2);
            animation: orbit linear infinite;
        }

        .dust-layer {
            position: fixed;
            inset: -10%;
            width: 120%;
            height: 120%;
            background-image: radial-gradient(circle, rgba(240,237,230,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: dust-drift 60s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @media (prefers-reduced-motion: reduce) {
            .animate-breathing-glow, .loading-bar-fill, .orbiting-icon, .dust-layer, .animate-slow-fade {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
            }
            .loading-bar-fill { width: 100% !important; }
        }
    </style>
</head>
<body class="bg-background overflow-hidden select-none">
<!-- Faint Dust Drift Layer -->
<div class="dust-layer"></div>
<!-- Deep Ambient Glows -->
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-primary/15 rounded-full animate-pulse-glow" style="animation-duration: 6s;"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/10 rounded-full animate-pulse-glow" style="animation-delay: -3s; animation-duration: 8s;"></div>
</div>
<!-- Background Canvas for Particles -->
<canvas id="constellation"></canvas>
<!-- Main Content Shell -->
<main class="relative z-10 w-full h-screen flex flex-col items-center justify-center px-lg">
<!-- Orbiting Icons Container -->
<div class="orbit-container">
<span class="material-symbols-outlined orbiting-icon text-[24px]" style="animation-duration: 25s; animation-delay: 0s;">menu_book</span>
<span class="material-symbols-outlined orbiting-icon text-[20px]" style="animation-duration: 35s; animation-delay: -8s;">schedule</span>
<span class="material-symbols-outlined orbiting-icon text-[28px]" style="animation-duration: 30s; animation-delay: -15s;">auto_awesome</span>
<span class="material-symbols-outlined orbiting-icon text-[22px]" style="animation-duration: 40s; animation-delay: -22s;">school</span>
</div>
<!-- Logo Section -->
<div class="flex flex-col items-center gap-md text-center max-w-md">
<div class="relative group">
<!-- Branding Anchor -->
<h1 class="font-display-lg text-display-lg-mobile md:text-display-lg text-cream tracking-tighter transition-all duration-700 animate-breathing-glow">
                    StudyMind AI
                </h1>
<!-- Subtle under-glow -->
<div class="absolute -inset-4 bg-primary/10 blur-2xl opacity-40 rounded-full"></div>
</div>
<p class="font-body-lg text-body-lg text-cream animate-slow-fade tracking-wide">
                Your AI-powered academic brain.
            </p>
<!-- Progress Container -->
<div class="mt-xl w-64 md:w-80 h-[2px] bg-white/5 rounded-full overflow-hidden relative backdrop-blur-sm">
<div class="loading-bar-fill h-full bg-primary shadow-[0_0_15px_rgba(108,99,255,0.8)]"></div>
</div>
<!-- Loading Status -->
<span class="mt-md font-label-md text-label-md text-cream/30 uppercase tracking-[0.25em] animate-pulse">
                Syncing Neural Library
            </span>
</div>
</main>
<!-- Decorative Corner Accents -->
<div class="fixed top-xl left-xl z-20 hidden md:block opacity-10 border-l border-t border-cream w-16 h-16"></div>
<div class="fixed bottom-xl right-xl z-20 hidden md:block opacity-10 border-r border-b border-cream w-16 h-16"></div>
<script>
        // Background Constellation Animation
        const canvas = document.getElementById('constellation');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const isReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const particleCount = isReducedMotion ? 0 : 70;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.radius = Math.random() * 1.2;
                this.alpha = Math.random() * 0.4 + 0.1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(240, 237, 230, ${this.alpha})`;
                ctx.fill();
            }
        }

        function createParticles() {
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 180) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(108, 99, 255, ${0.08 * (1 - dist / 180)})`;
                        ctx.lineWidth = 0.6;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            if (isReducedMotion) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            connectParticles();
            requestAnimationFrame(animate);
        }

        if (!isReducedMotion) {
            createParticles();
            animate();
        }

        // Simulating transition end
        setTimeout(() => {
            console.log("App ready.");
        }, 3000);
    </script>
</body></html>
