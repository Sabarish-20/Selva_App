<script>
        // Simple Timer Logic
        let timeLeft = 1500; // 25:00
        let timerId = null;
        let isRunning = false;

        const timerDisplay = document.getElementById('timer-display');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const progressCircle = document.getElementById('timer-progress');
        const totalTime = 1500;

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Update circular progress
            const progress = (timeLeft / totalTime) * 100;
            progressCircle.style.strokeDasharray = `${progress} 100`;
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerId);
                playPauseBtn.querySelector('span').textContent = 'play_arrow';
                playPauseBtn.classList.remove('bg-secondary-container');
                playPauseBtn.classList.add('bg-primary');
            } else {
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timerId);
                        alert("Focus Session Complete!");
                    }
                }, 1000);
                playPauseBtn.querySelector('span').textContent = 'pause';
                playPauseBtn.classList.remove('bg-primary');
                playPauseBtn.classList.add('bg-secondary-container');
            }
            isRunning = !isRunning;
        }

        playPauseBtn.addEventListener('click', toggleTimer);

        // Interaction for checkboxes
        document.querySelectorAll('.glass-card').forEach(card => {
            if(card.querySelector('.w-6')) {
                card.addEventListener('click', () => {
                    // Microinteraction toggle logic could go here
                });
            }
        });

        // Initialize display
        updateDisplay();
    </script>
